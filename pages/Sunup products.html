<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Opulent — Manage Products</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
:root{
  --pink:#C0547A;--pink-light:#E06E8A;--pink-pale:#FDF0F4;--pink-border:#F2D0DB;
  --bg:#FFF8FB;--text:#2E1A22;--muted:#9B6B7A;--shadow:rgba(192,84,122,0.12);
  --green:#27ae60;--red:#e74c3c;--blue:#2980b9;--orange:#e67e22;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);}

/* TOPBAR */
.topbar{background:#fff;border-bottom:1.5px solid var(--pink-border);padding:0 24px;height:58px;
  display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 2px 10px var(--shadow);}
.tbar-left{display:flex;align-items:center;gap:14px;}
.logo{display:flex;align-items:center;gap:9px;text-decoration:none;}
.logo-icon{width:36px;height:36px;background:var(--pink);border-radius:9px;display:flex;align-items:center;justify-content:center;}
.brand{font-size:15px;font-weight:900;color:var(--pink);}
.page-label{font-size:16px;font-weight:800;color:var(--text);}
.tbar-right{display:flex;align-items:center;gap:8px;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:100px;
  font-size:12.5px;font-weight:800;border:none;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .15s;}
.btn-sm{padding:5px 12px;font-size:12px;}
.btn-primary{background:var(--pink);color:#fff;}
.btn-primary:hover{background:var(--pink-light);}
.btn-secondary{background:var(--pink-pale);color:var(--pink);border:1.5px solid var(--pink-border);}
.btn-secondary:hover{background:var(--pink-border);}
.btn-danger{background:#fdecea;color:var(--red);border:1.5px solid #f5c6c2;}
.btn-danger:hover{background:#f5c6c2;}
.btn-green{background:#e8f8ef;color:var(--green);border:1.5px solid #b8e8ce;}
.btn-green:hover{background:#b8e8ce;}

/* CONTENT */
.content{padding:20px 24px 60px;}

/* STATS ROW */
.stats-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:20px;}
.stat-mini{background:#fff;border:1px solid var(--pink-border);border-radius:12px;padding:14px;display:flex;align-items:center;gap:11px;}
.stat-mini-icon{font-size:22px;}
.stat-mini-num{font-size:20px;font-weight:900;}
.stat-mini-label{font-size:11px;color:var(--muted);font-weight:600;}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.search-input{flex:1;min-width:200px;max-width:320px;padding:9px 14px;border:1.5px solid var(--pink-border);
  border-radius:100px;font-size:13px;font-family:'Nunito',sans-serif;color:var(--text);background:#fff;outline:none;}
.search-input:focus{border-color:var(--pink);}
.fselect{padding:8px 13px;border:1.5px solid var(--pink-border);border-radius:9px;
  font-size:12.5px;font-family:'Nunito',sans-serif;font-weight:700;color:var(--text);background:#fff;outline:none;cursor:pointer;}
.fselect:focus{border-color:var(--pink);}
.results-count{font-size:12px;color:var(--muted);font-weight:600;margin-left:auto;}

/* VIEW TABS */
.view-tabs{display:flex;gap:4px;padding:3px;background:var(--pink-pale);border-radius:9px;}
.vtab{width:32px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:6px;
  border:none;background:none;cursor:pointer;font-size:14px;transition:all .15s;}
.vtab.active{background:#fff;box-shadow:0 1px 4px var(--shadow);}

/* TABLE VIEW */
.table-wrap{overflow-x:auto;border-radius:14px;border:1px solid var(--pink-border);background:#fff;}
table{width:100%;border-collapse:collapse;}
th{background:var(--pink-pale);font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;
  padding:11px 14px;text-align:left;color:var(--muted);white-space:nowrap;}
td{padding:11px 14px;font-size:13px;border-bottom:1px solid var(--pink-border);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#fffbfc;}
.td-img{width:42px;height:42px;border-radius:8px;object-fit:cover;background:#eee;}
.td-name{font-weight:800;font-size:13px;}
.td-desc{font-size:11px;color:var(--muted);max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.td-price{font-weight:900;color:var(--pink);font-size:13.5px;}
.td-old{font-size:11px;color:var(--muted);text-decoration:line-through;}
.stock-ok{color:var(--green);font-weight:800;}
.stock-low{color:var(--orange);font-weight:800;}
.stock-out{color:var(--red);font-weight:800;}
.td-actions{display:flex;gap:5px;}
.badge-pill{display:inline-block;padding:3px 10px;border-radius:100px;font-size:9.5px;font-weight:800;}
.bp-sale{background:#FFF3E0;color:var(--orange);}
.bp-new{background:#E8F5E9;color:var(--green);}
.bp-hot{background:#fdecea;color:var(--red);}
.bp-limited{background:#E3F2FD;color:var(--blue);}
.bp-none{background:var(--pink-pale);color:var(--muted);}

/* GRID VIEW */
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px;}
.pcard{background:#fff;border-radius:14px;border:1px solid var(--pink-border);overflow:hidden;transition:transform .2s,box-shadow .2s;}
.pcard:hover{transform:translateY(-3px);box-shadow:0 8px 24px var(--shadow);}
.pcard-img{aspect-ratio:4/3;overflow:hidden;background:var(--pink-pale);position:relative;}
.pcard-img img{width:100%;height:100%;object-fit:cover;}
.pcard-badge-wrap{position:absolute;top:8px;left:8px;display:flex;gap:5px;flex-direction:column;}
.pcard-body{padding:12px;}
.pcard-cat{font-size:10px;font-weight:700;text-transform:uppercase;color:var(--muted);margin-bottom:2px;}
.pcard-name{font-size:13px;font-weight:800;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pcard-prices{display:flex;align-items:baseline;gap:6px;margin-bottom:8px;}
.pcard-price{font-size:14px;font-weight:900;color:var(--pink);}
.pcard-old{font-size:11px;color:var(--muted);text-decoration:line-through;}
.pcard-actions{display:flex;gap:6px;}
.pcard-stock-bar{height:5px;border-radius:100px;background:var(--pink-pale);margin-bottom:7px;overflow:hidden;}
.pcard-stock-fill{height:100%;border-radius:100px;}

/* FORM MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;
  align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;padding:14px;}
.modal-bg.open{opacity:1;pointer-events:all;}
.modal{background:#fff;border-radius:18px;width:100%;max-width:580px;max-height:92vh;
  overflow-y:auto;transform:translateY(14px);transition:transform .25s;}
.modal-bg.open .modal{transform:translateY(0);}
.mh{padding:18px 20px 14px;border-bottom:1px solid var(--pink-border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:2;}
.mh h2{font-size:16px;font-weight:800;}
.close-x{width:30px;height:30px;border-radius:50%;background:var(--pink-pale);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;color:var(--pink);font-size:15px;font-weight:900;}
.mb{padding:18px 20px;}
.fg{margin-bottom:13px;}
.fg label{display:block;font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:5px;}
.fg input,.fg select,.fg textarea{width:100%;padding:9px 12px;border:1.5px solid var(--pink-border);
  border-radius:9px;font-size:13.5px;font-family:'Nunito',sans-serif;color:var(--text);background:#FFF5F8;outline:none;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--pink);background:#fff;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

/* IMAGE UPLOAD */
.img-zone{border:2.5px dashed var(--pink-border);border-radius:14px;padding:20px;text-align:center;
  cursor:pointer;transition:all .15s;margin-bottom:13px;position:relative;overflow:hidden;}
.img-zone:hover{border-color:var(--pink);background:var(--pink-pale);}
.img-zone.has-img{padding:0;border-style:solid;}
.img-zone img{width:100%;height:180px;object-fit:cover;border-radius:11px;}
.img-zone-label{font-size:13px;font-weight:700;color:var(--muted);margin-top:8px;}
.img-zone-sub{font-size:11.5px;color:var(--muted);margin-top:4px;}
.img-zone-overlay{position:absolute;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;border-radius:11px;cursor:pointer;}
.img-zone:hover .img-zone-overlay{display:flex;}
.img-zone-overlay span{color:#fff;font-size:13px;font-weight:800;background:rgba(0,0,0,.3);padding:7px 16px;border-radius:100px;}

/* URL input section */
.url-section{border:1px solid var(--pink-border);border-radius:10px;padding:12px;margin-top:8px;background:#f9f5f7;}
.url-section label{font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;display:block;margin-bottom:5px;}
.url-input-row{display:flex;gap:7px;}
.url-input-row input{flex:1;padding:8px 11px;border:1.5px solid var(--pink-border);border-radius:8px;font-size:13px;font-family:'Nunito',sans-serif;outline:none;background:#fff;}
.url-input-row input:focus{border-color:var(--pink);}

/* BULK ACTIONS */
.bulk-bar{background:var(--pink);color:#fff;padding:10px 16px;border-radius:12px;display:none;align-items:center;justify-content:space-between;margin-bottom:12px;}
.bulk-bar.show{display:flex;}
.bulk-count{font-size:13px;font-weight:800;}
.bulk-actions{display:flex;gap:7px;}
.bulk-btn{padding:6px 14px;border-radius:100px;font-size:12px;font-weight:800;border:1.5px solid rgba(255,255,255,.4);background:rgba(255,255,255,.15);color:#fff;cursor:pointer;font-family:'Nunito',sans-serif;}
.bulk-btn:hover{background:rgba(255,255,255,.3);}

/* CONFIRM MODAL */
.confirm-modal{background:#fff;border-radius:16px;max-width:360px;padding:28px;text-align:center;}
.confirm-icon{font-size:42px;margin-bottom:12px;}
.confirm-title{font-size:17px;font-weight:800;margin-bottom:7px;}
.confirm-msg{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:18px;}
.confirm-btns{display:flex;gap:9px;justify-content:center;}

/* EMPTY */
.empty-state{text-align:center;padding:60px;color:var(--muted);}
.empty-icon{font-size:48px;margin-bottom:12px;}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--text);color:#fff;padding:10px 22px;
  border-radius:100px;font-size:13px;font-weight:700;z-index:600;opacity:0;pointer-events:none;transition:all .25s;white-space:nowrap;transform:translateY(8px);}
.toast.show{opacity:1;transform:translateY(0);}

::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:var(--pink-border);border-radius:2px;}
@media(max-width:640px){.frow{grid-template-columns:1fr;}.tbar-right{gap:5px;}.view-tabs{display:none;}}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="tbar-left">
    <a class="logo" href="#">
      <div class="logo-icon"><svg width="18" height="16" viewBox="0 0 24 22" fill="none"><path d="M12 1L1 9v12h7v-7h8v7h7V9L12 1z" fill="white"/></svg></div>
      <div class="brand">Opulent</div>
    </a>
    <div style="width:1px;height:22px;background:var(--pink-border)"></div>
    <div class="page-label">🏷️ Manage Products</div>
  </div>
  <div class="tbar-right">
    <button class="btn btn-secondary" onclick="window.open('opulent-admin.html','_blank')">⚙️ Admin ↗</button>
    <button class="btn btn-secondary" onclick="window.open('sunup-shop.html','_blank')">🛒 Shop ↗</button>
    <button class="btn btn-primary" onclick="openForm()">+ Add Product</button>
  </div>
</div>

<!-- MAIN CONTENT -->
<div class="content">

  <!-- STATS ROW -->
  <div class="stats-row" id="statsRow"></div>

  <!-- TOOLBAR -->
  <div class="bulk-bar" id="bulkBar">
    <span class="bulk-count" id="bulkCount">0 selected</span>
    <div class="bulk-actions">
      <button class="bulk-btn" onclick="bulkRestock()">📦 Restock All</button>
      <button class="bulk-btn" onclick="bulkDelete()">🗑 Delete Selected</button>
      <button class="bulk-btn" onclick="clearSelection()">✕ Clear</button>
    </div>
  </div>
  <div class="toolbar">
    <input class="search-input" id="searchInput" placeholder="🔍 Search products…" oninput="renderTable()"/>
    <select class="fselect" id="catFilter" onchange="renderTable()">
      <option value="all">All Categories</option>
      <option value="kitchen">Kitchen</option>
      <option value="living">Living Room</option>
      <option value="appliances">Appliances</option>
      <option value="gifts">Gifts</option>
      <option value="decor">Decor</option>
      <option value="travel">Travel</option>
      <option value="laundry">Laundry</option>
    </select>
    <select class="fselect" id="stockFilter" onchange="renderTable()">
      <option value="all">All Stock</option>
      <option value="ok">In Stock</option>
      <option value="low">Low Stock (≤5)</option>
      <option value="out">Out of Stock</option>
    </select>
    <select class="fselect" id="sortSelect" onchange="renderTable()">
      <option value="default">Sort: Default</option>
      <option value="price-asc">Price: Low → High</option>
      <option value="price-desc">Price: High → Low</option>
      <option value="stock-asc">Stock: Low → High</option>
      <option value="name-asc">Name A–Z</option>
    </select>
    <span class="results-count" id="resultsCount"></span>
    <div class="view-tabs">
      <button class="vtab active" id="vtab-table" onclick="setView('table')">☰</button>
      <button class="vtab" id="vtab-grid" onclick="setView('grid')">⊞</button>
    </div>
  </div>

  <!-- TABLE / GRID -->
  <div id="tableView">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th><input type="checkbox" id="selectAll" onchange="toggleSelectAll(this.checked)" style="accent-color:var(--pink)"/></th>
            <th>Image</th><th>Product Name</th><th>Category</th><th>Price</th><th>Old Price</th><th>Stock</th><th>Badge</th><th>Actions</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>
  <div id="gridView" style="display:none">
    <div class="product-grid" id="prodGrid"></div>
  </div>
  <div class="empty-state" id="emptyState" style="display:none">
    <div class="empty-icon">📦</div>
    <div style="font-size:16px;font-weight:800;margin-bottom:7px">No products found</div>
    <div style="font-size:13px;margin-bottom:16px">Try adjusting your filters or search</div>
    <button class="btn btn-primary" onclick="openForm()">+ Add Your First Product</button>
  </div>
</div>

<!-- ADD/EDIT PRODUCT MODAL -->
<div class="modal-bg" id="productModal">
  <div class="modal">
    <div class="mh">
      <h2 id="formTitle">+ Add Product</h2>
      <button class="close-x" onclick="closeForm()">✕</button>
    </div>
    <div class="mb">
      <div class="img-zone" id="imgZone" onclick="document.getElementById('imgFileInput').click()">
        <input type="file" id="imgFileInput" accept="image/*" style="display:none" onchange="previewImg(this)"/>
        <div id="imgZoneContent">
          <div style="font-size:32px;margin-bottom:4px">📸</div>
          <div class="img-zone-label">Click to upload product image</div>
          <div class="img-zone-sub">JPG, PNG, or WebP — max 5MB</div>
        </div>
      </div>
      <div class="url-section">
        <label>Or paste an image URL</label>
        <div class="url-input-row">
          <input type="text" id="imgUrlInput" placeholder="https://example.com/image.jpg"/>
          <button class="btn btn-secondary btn-sm" onclick="loadUrlImg()">Load</button>
        </div>
      </div>
      <div style="height:14px"></div>
      <div class="fg" style="grid-column:1/-1"><label>Product Name *</label><input type="text" id="pName" placeholder="e.g. Bamboo Dish Rack"/></div>
      <div class="fg"><label>Description *</label><textarea id="pDesc" rows="3" placeholder="Describe your product…" style="resize:vertical"></textarea></div>
      <div class="frow">
        <div class="fg"><label>Category *</label>
          <select id="pCat">
            <option value="kitchen">🥘 Kitchen</option>
            <option value="living">🛋️ Living Room</option>
            <option value="appliances">🔌 Appliances</option>
            <option value="gifts">🎁 Gifts</option>
            <option value="decor">🌿 Decor</option>
            <option value="travel">🧳 Travel</option>
            <option value="laundry">🫧 Laundry</option>
          </select>
        </div>
        <div class="fg"><label>Badge</label>
          <select id="pBadge">
            <option value="">None</option>
            <option value="New">🟢 New</option>
            <option value="Sale">🟠 Sale</option>
            <option value="Hot">🔴 Hot</option>
            <option value="Limited">🔵 Limited</option>
          </select>
        </div>
      </div>
      <div class="frow">
        <div class="fg"><label>Price (Ksh) *</label><input type="number" id="pPrice" placeholder="1500" min="0"/></div>
        <div class="fg"><label>Old Price / Strikethrough (Ksh)</label><input type="number" id="pOldPrice" placeholder="Leave empty if no discount" min="0"/></div>
      </div>
      <div class="frow">
        <div class="fg"><label>Stock Quantity *</label><input type="number" id="pStock" placeholder="50" min="0"/></div>
        <div class="fg"><label>Initial Rating (1–5)</label><input type="number" id="pRating" placeholder="4.5" min="1" max="5" step="0.1"/></div>
      </div>
      <input type="hidden" id="pId"/>
      <input type="hidden" id="pImgData"/>
      <button class="btn btn-primary" style="width:100%;padding:13px;border-radius:100px;font-size:14px;margin-top:4px;" onclick="saveProduct()">
        <span id="saveBtnText">Save Product</span>
      </button>
    </div>
  </div>
</div>

<!-- CONFIRM DELETE MODAL -->
<div class="modal-bg" id="confirmModal">
  <div class="confirm-modal">
    <div class="confirm-icon">🗑️</div>
    <div class="confirm-title">Delete Product?</div>
    <div class="confirm-msg" id="confirmMsg">This action cannot be undone.</div>
    <div class="confirm-btns">
      <button class="btn btn-secondary" onclick="document.getElementById('confirmModal').classList.remove('open')">Cancel</button>
      <button class="btn btn-danger" id="confirmYes">Delete</button>
    </div>
  </div>
</div>

<!-- RESTOCK MODAL -->
<div class="modal-bg" id="restockModal">
  <div class="confirm-modal">
    <div class="confirm-icon">📦</div>
    <div class="confirm-title" id="restockTitle">Restock Product</div>
    <div class="fg" style="text-align:left;margin-bottom:14px">
      <label style="font-size:11px;font-weight:800;text-transform:uppercase;color:var(--muted);letter-spacing:.07em;display:block;margin-bottom:5px;">Units to Add</label>
      <input type="number" id="restockQty" value="50" min="1" style="padding:9px 12px;border:1.5px solid var(--pink-border);border-radius:9px;font-size:14px;font-family:'Nunito',sans-serif;width:100%;outline:none;background:#FFF5F8;"/>
    </div>
    <div class="confirm-btns">
      <button class="btn btn-secondary" onclick="document.getElementById('restockModal').classList.remove('open')">Cancel</button>
      <button class="btn btn-primary" onclick="doRestock()">Add Stock</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

// ─── STATE ────────────────────────────────────────────────────────
let PRODUCTS = JSON.parse(localStorage.getItem('sc_products')||'null') || JSON.parse(JSON.stringify(DEFAULT_PRODUCTS));
let nextId = Math.max(...PRODUCTS.map(p=>p.id),0)+1;
let selected = new Set();
let currentView = 'table';
let pendingImgData = null;
let restockId = null;

const saveLocal = () => localStorage.setItem('sc_products', JSON.stringify(PRODUCTS));
const save = saveLocal;

async function saveProductToDB(p){
  try {
    await _sb.from('products').upsert({
      id: p.id, name: p.name, cat: p.cat, price: p.price,
      old_price: p.oldPrice || null, stock: p.stock, rating: p.rating,
      reviews: p.reviews || 0, badge: p.badge || null,
      description: p.desc, img: p.img,
      updated_at: new Date().toISOString()
    }, { onConflict:'id' });
  } catch(e){ console.warn('DB save failed', e); }
}

async function deleteProductFromDB(id){
  try { await _sb.from('products').delete().eq('id', id); }
  catch(e){ console.warn('DB delete failed', e); }
}

async function loadProductsFromDB(){
  try {
    const { data, error } = await _sb.from('products').select('*').order('id');
    if(!error && data && data.length > 0){
      PRODUCTS = data.map(p=>({
        id:p.id, name:p.name, cat:p.cat, price:p.price,
        oldPrice:p.old_price, stock:p.stock, rating:Number(p.rating),
        reviews:p.reviews, badge:p.badge, desc:p.description, img:p.img
      }));
      nextId = Math.max(...PRODUCTS.map(p=>p.id),0)+1;
      saveLocal();
    }
  } catch(e){ console.warn('Products load failed, using cache', e); }
}
const fmt  = p => 'Ksh. '+Number(p).toLocaleString();
const disc = p => p.oldPrice ? Math.round((1-p.price/p.oldPrice)*100) : 0;

// ─── TOAST ────────────────────────────────────────────────────────
function toast(msg, dur=2500){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),dur);
}

// ─── STATS ───────────────────────────────────────────────────────
function renderStats(){
  const total=PRODUCTS.length;
  const inStock=PRODUCTS.filter(p=>p.stock>5).length;
  const low=PRODUCTS.filter(p=>p.stock>0&&p.stock<=5).length;
  const out=PRODUCTS.filter(p=>p.stock===0).length;
  const cats=new Set(PRODUCTS.map(p=>p.cat)).size;
  document.getElementById('statsRow').innerHTML=`
    <div class="stat-mini"><div class="stat-mini-icon">🏷️</div><div><div class="stat-mini-num">${total}</div><div class="stat-mini-label">Total Products</div></div></div>
    <div class="stat-mini"><div class="stat-mini-icon" style="color:var(--green)">✅</div><div><div class="stat-mini-num" style="color:var(--green)">${inStock}</div><div class="stat-mini-label">In Stock</div></div></div>
    <div class="stat-mini"><div class="stat-mini-icon" style="color:var(--orange)">⚡</div><div><div class="stat-mini-num" style="color:var(--orange)">${low}</div><div class="stat-mini-label">Low Stock (≤5)</div></div></div>
    <div class="stat-mini"><div class="stat-mini-icon" style="color:var(--red)">❌</div><div><div class="stat-mini-num" style="color:var(--red)">${out}</div><div class="stat-mini-label">Out of Stock</div></div></div>
    <div class="stat-mini"><div class="stat-mini-icon">🗂️</div><div><div class="stat-mini-num">${cats}</div><div class="stat-mini-label">Categories</div></div></div>`;
}

// ─── FILTER & SORT ────────────────────────────────────────────────
function getFiltered(){
  const q=(document.getElementById('searchInput')?.value||'').toLowerCase();
  const cat=document.getElementById('catFilter')?.value||'all';
  const stock=document.getElementById('stockFilter')?.value||'all';
  const sort=document.getElementById('sortSelect')?.value||'default';
  let list=PRODUCTS.filter(p=>{
    const mQ=!q||(p.name.toLowerCase().includes(q)||p.cat.toLowerCase().includes(q)||p.desc.toLowerCase().includes(q));
    const mC=cat==='all'||p.cat===cat;
    const mS=stock==='all'||(stock==='ok'&&p.stock>5)||(stock==='low'&&p.stock>0&&p.stock<=5)||(stock==='out'&&p.stock===0);
    return mQ&&mC&&mS;
  });
  if(sort==='price-asc')list.sort((a,b)=>a.price-b.price);
  else if(sort==='price-desc')list.sort((a,b)=>b.price-a.price);
  else if(sort==='stock-asc')list.sort((a,b)=>a.stock-b.stock);
  else if(sort==='name-asc')list.sort((a,b)=>a.name.localeCompare(b.name));
  return list;
}

// ─── TABLE VIEW ───────────────────────────────────────────────────
function renderTable(){
  const list=getFiltered();
  document.getElementById('resultsCount').textContent=list.length+' product'+(list.length!==1?'s':'');
  document.getElementById('emptyState').style.display=list.length?'none':'block';
  document.getElementById('tableView').style.display=currentView==='table'?'block':'none';
  document.getElementById('gridView').style.display=currentView==='grid'?'block':'none';

  const badgeClass={'New':'bp-new','Sale':'bp-sale','Hot':'bp-hot','Limited':'bp-limited'};
  if(currentView==='table'){
    document.getElementById('tableBody').innerHTML=list.map(p=>`
      <tr>
        <td><input type="checkbox" ${selected.has(p.id)?'checked':''} style="accent-color:var(--pink)" onchange="toggleSelect(${p.id},this.checked)"/></td>
        <td><img class="td-img" src="${p.img}" alt="${p.name}" onerror="this.src='https://images.unsplash.com/photo-1556909114-f6e7ad7d3136?w=200&q=60'"/></td>
        <td><div class="td-name">${p.name}</div><div class="td-desc">${p.desc}</div></td>
        <td style="text-transform:capitalize;font-weight:600">${p.cat}</td>
        <td><div class="td-price">${fmt(p.price)}</div></td>
        <td><div class="td-old">${p.oldPrice?fmt(p.oldPrice):'—'}</div>${p.oldPrice?`<div style="font-size:10.5px;color:var(--green);font-weight:800">-${disc(p)}%</div>`:''}</td>
        <td><span class="${p.stock===0?'stock-out':p.stock<=5?'stock-low':'stock-ok'}">${p.stock===0?'Out of stock':p.stock+' units'}</span></td>
        <td><span class="badge-pill ${badgeClass[p.badge]||'bp-none'}">${p.badge||'—'}</span></td>
        <td><div class="td-actions">
          <button class="btn btn-secondary btn-sm" onclick="openForm(${p.id})">✏️ Edit</button>
          <button class="btn btn-green btn-sm" onclick="openRestock(${p.id})">📦</button>
          <button class="btn btn-danger btn-sm" onclick="confirmDelete(${p.id})">🗑</button>
        </div></td>
      </tr>`).join('');
  } else {
    document.getElementById('prodGrid').innerHTML=list.map(p=>{
      const maxStock=100;
      const stockPct=Math.min(p.stock/maxStock*100,100);
      const stockColor=p.stock===0?'var(--red)':p.stock<=5?'var(--orange)':'var(--green)';
      return `<div class="pcard">
        <div class="pcard-img">
          <img src="${p.img}" alt="${p.name}" onerror="this.src='https://images.unsplash.com/photo-1556909114-f6e7ad7d3136?w=200&q=60'"/>
          <div class="pcard-badge-wrap">
            ${p.badge?`<span class="badge-pill ${badgeClass[p.badge]||'bp-none'}">${p.badge}</span>`:''}
          </div>
        </div>
        <div class="pcard-body">
          <div class="pcard-cat">${p.cat}</div>
          <div class="pcard-name" title="${p.name}">${p.name}</div>
          <div class="pcard-prices">
            <span class="pcard-price">${fmt(p.price)}</span>
            ${p.oldPrice?`<span class="pcard-old">${fmt(p.oldPrice)}</span>`:''}
          </div>
          <div class="pcard-stock-bar"><div class="pcard-stock-fill" style="width:${stockPct}%;background:${stockColor}"></div></div>
          <div style="font-size:11px;font-weight:700;color:${stockColor};margin-bottom:8px">${p.stock===0?'Out of stock':p.stock<=5?'⚡ Low: '+p.stock+' left':p.stock+' in stock'}</div>
          <div style="display:flex;gap:5px;flex-wrap:wrap">
            <button class="btn btn-secondary btn-sm" onclick="openForm(${p.id})">✏️ Edit</button>
            <button class="btn btn-green btn-sm" onclick="openRestock(${p.id})">📦 Restock</button>
            <button class="btn btn-danger btn-sm" onclick="confirmDelete(${p.id})">🗑</button>
          </div>
        </div>
      </div>`;}).join('');
  }
}

function setView(v){
  currentView=v;
  document.getElementById('vtab-table').classList.toggle('active',v==='table');
  document.getElementById('vtab-grid').classList.toggle('active',v==='grid');
  renderTable();
}

// ─── SELECTION ────────────────────────────────────────────────────
function toggleSelect(id,checked){
  if(checked)selected.add(id); else selected.delete(id);
  updateBulkBar();
}
function toggleSelectAll(checked){
  const list=getFiltered();
  list.forEach(p=>checked?selected.add(p.id):selected.delete(p.id));
  renderTable();updateBulkBar();
}
function clearSelection(){selected.clear();document.getElementById('selectAll').checked=false;renderTable();updateBulkBar();}
function updateBulkBar(){
  const bb=document.getElementById('bulkBar');
  if(selected.size>0){bb.classList.add('show');document.getElementById('bulkCount').textContent=selected.size+' selected';}
  else bb.classList.remove('show');
}
function bulkDelete(){
  if(!confirm(`Delete ${selected.size} products?`))return;
  PRODUCTS=PRODUCTS.filter(p=>!selected.has(p.id));
  save();selected.clear();renderTable();renderStats();updateBulkBar();toast(`✅ ${selected.size} products deleted`);
}
function bulkRestock(){
  const qty=parseInt(prompt('Units to add to each selected product:','50'));
  if(!qty||isNaN(qty))return;
  selected.forEach(id=>{const p=PRODUCTS.find(x=>x.id===id);if(p)p.stock+=qty;});
  save();renderTable();renderStats();updateBulkBar();toast(`✅ +${qty} units added to ${selected.size} products`);
}

// ─── ADD/EDIT FORM ────────────────────────────────────────────────
function openForm(id=null){
  pendingImgData=null;
  document.getElementById('formTitle').textContent=id?'✏️ Edit Product':'+ Add Product';
  document.getElementById('saveBtnText').textContent=id?'Save Changes':'Add Product';
  document.getElementById('pId').value=id||'';
  const p=id?PRODUCTS.find(x=>x.id===id):null;
  document.getElementById('pName').value=p?.name||'';
  document.getElementById('pDesc').value=p?.desc||'';
  document.getElementById('pCat').value=p?.cat||'kitchen';
  document.getElementById('pPrice').value=p?.price||'';
  document.getElementById('pOldPrice').value=p?.oldPrice||'';
  document.getElementById('pStock').value=p?.stock!==undefined?p.stock:'';
  document.getElementById('pRating').value=p?.rating||'4.5';
  document.getElementById('pBadge').value=p?.badge||'';
  document.getElementById('pImgData').value=p?.img||'';
  document.getElementById('imgUrlInput').value='';
  // Image preview
  const zone=document.getElementById('imgZone'),zc=document.getElementById('imgZoneContent');
  if(p?.img){
    zone.classList.add('has-img');
    zone.innerHTML=`<input type="file" id="imgFileInput" accept="image/*" style="display:none" onchange="previewImg(this)"/>
      <img src="${p.img}" onerror="this.src='https://images.unsplash.com/photo-1556909114-f6e7ad7d3136?w=600&q=80'"/>
      <div class="img-zone-overlay" onclick="document.getElementById('imgFileInput').click()"><span>Change Image</span></div>`;
  } else {
    zone.classList.remove('has-img');
    zone.innerHTML=`<input type="file" id="imgFileInput" accept="image/*" style="display:none" onchange="previewImg(this)"/>
      <div id="imgZoneContent"><div style="font-size:32px;margin-bottom:4px">📸</div><div class="img-zone-label">Click to upload product image</div><div class="img-zone-sub">JPG, PNG, or WebP — max 5MB</div></div>`;
  }
  document.getElementById('productModal').classList.add('open');
  setTimeout(()=>document.getElementById('pName').focus(),100);
}
function closeForm(){document.getElementById('productModal').classList.remove('open');}

function previewImg(input){
  const file=input.files[0];if(!file)return;
  if(file.size>5*1024*1024){toast('⚠ File too large (max 5MB)');return;}
  const reader=new FileReader();
  reader.onload=e=>{
    pendingImgData=e.target.result;
    document.getElementById('pImgData').value=pendingImgData;
    const zone=document.getElementById('imgZone');
    zone.classList.add('has-img');
    zone.innerHTML=`<input type="file" id="imgFileInput" accept="image/*" style="display:none" onchange="previewImg(this)"/>
      <img src="${pendingImgData}"/>
      <div class="img-zone-overlay" onclick="document.getElementById('imgFileInput').click()"><span>Change Image</span></div>`;
  };
  reader.readAsDataURL(file);
}
function loadUrlImg(){
  const url=document.getElementById('imgUrlInput').value.trim();
  if(!url){toast('⚠ Enter a URL first');return;}
  pendingImgData=null;
  document.getElementById('pImgData').value=url;
  const zone=document.getElementById('imgZone');
  zone.classList.add('has-img');
  zone.innerHTML=`<input type="file" id="imgFileInput" accept="image/*" style="display:none" onchange="previewImg(this)"/>
    <img src="${url}" onerror="this.src='https://images.unsplash.com/photo-1556909114-f6e7ad7d3136?w=600&q=80'"/>
    <div class="img-zone-overlay" onclick="document.getElementById('imgFileInput').click()"><span>Change Image</span></div>`;
  toast('✅ Image URL loaded');
}

function saveProduct(){
  const name=document.getElementById('pName').value.trim();
  const desc=document.getElementById('pDesc').value.trim();
  const cat=document.getElementById('pCat').value;
  const price=parseFloat(document.getElementById('pPrice').value);
  const oldPrice=parseFloat(document.getElementById('pOldPrice').value)||null;
  const stock=parseInt(document.getElementById('pStock').value)||0;
  const rating=parseFloat(document.getElementById('pRating').value)||4.5;
  const badge=document.getElementById('pBadge').value||null;
  const img=document.getElementById('pImgData').value||'https://images.unsplash.com/photo-1556909114-f6e7ad7d3136?w=600&q=80';
  const idVal=document.getElementById('pId').value;

  if(!name){toast('⚠ Product name is required');document.getElementById('pName').focus();return;}
  if(!price||isNaN(price)){toast('⚠ Valid price is required');document.getElementById('pPrice').focus();return;}
  if(!desc){toast('⚠ Description is required');document.getElementById('pDesc').focus();return;}

  if(idVal){
    const p=PRODUCTS.find(x=>x.id===parseInt(idVal));
    if(p)Object.assign(p,{name,desc,cat,price,oldPrice,stock,rating:Math.max(1,Math.min(5,rating)),badge,img});
    toast('✅ Product updated!');
  } else {
    PRODUCTS.push({id:nextId++,name,desc,cat,price,oldPrice,stock,rating:Math.max(1,Math.min(5,rating)),reviews:0,badge,img});
    toast('✅ Product added!');
  }
  save();
  saveProductToDB(idVal ? PRODUCTS.find(x=>x.id===parseInt(idVal)) : PRODUCTS[PRODUCTS.length-1]);
  closeForm();renderTable();renderStats();
}

// ─── DELETE ───────────────────────────────────────────────────────
function confirmDelete(id){
  const p=PRODUCTS.find(x=>x.id===id);
  document.getElementById('confirmMsg').textContent=`Delete "${p?.name}"? This cannot be undone.`;
  document.getElementById('confirmYes').onclick=()=>deleteProduct(id);
  document.getElementById('confirmModal').classList.add('open');
}
function deleteProduct(id){
  PRODUCTS=PRODUCTS.filter(x=>x.id!==id);
  save(); deleteProductFromDB(id);
  renderTable();renderStats();
  document.getElementById('confirmModal').classList.remove('open');
  toast('Product deleted');
}

// ─── RESTOCK ─────────────────────────────────────────────────────
function openRestock(id){
  restockId=id;
  const p=PRODUCTS.find(x=>x.id===id);
  document.getElementById('restockTitle').textContent='📦 Restock: '+p?.name;
  document.getElementById('restockQty').value=50;
  document.getElementById('restockModal').classList.add('open');
}
function doRestock(){
  const qty=parseInt(document.getElementById('restockQty').value);
  if(!qty||isNaN(qty)||qty<1){toast('⚠ Enter valid quantity');return;}
  const p=PRODUCTS.find(x=>x.id===restockId);
  if(p){p.stock+=qty;save();renderTable();renderStats();toast(`✅ +${qty} units added to "${p.name}"`);}
  document.getElementById('restockModal').classList.remove('open');
}

// ─── CLOSE MODALS ON BG CLICK ────────────────────────────────────
document.querySelectorAll('.modal-bg').forEach(bg=>bg.addEventListener('click',e=>{if(e.target===bg)bg.classList.remove('open');}));
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.querySelectorAll('.modal-bg.open').forEach(m=>m.classList.remove('open'));});

// ─── SYNC FROM OTHER TABS ─────────────────────────────────────────
window.addEventListener('storage',e=>{
  if(e.key==='sc_products'){
    PRODUCTS=JSON.parse(e.newValue||'null')||PRODUCTS;
    nextId=Math.max(...PRODUCTS.map(p=>p.id),0)+1;
    renderTable();renderStats();
  }
});

// ─── INIT ────────────────────────────────────────────────────────
async function productsInit(){
  // Auth guard
  const { data:{ session } } = await _sb.auth.getSession();
  if(!session?.user){ window.location.href='admin-login.html'; return; }
  const { data:profile } = await _sb.from('profiles').select('role').eq('id',session.user.id).single();
  if(!profile || profile.role !== 'admin'){ window.location.href='admin-login.html'; return; }
  // Load products from DB
  await loadProductsFromDB();
  renderStats(); renderTable();
}
productsInit();
