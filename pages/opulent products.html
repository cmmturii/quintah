<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Opulent — Manage Products</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
:root{
  --pink:#C0547A;--pink-light:#E06E8A;--pink-pale:#FDF0F4;--pink-border:#F2D0DB;
  --bg:#FFF8FB;--text:#2E1A22;--muted:#9B6B7A;--shadow:rgba(192,84,122,0.12);
  --green:#27ae60;--red:#e74c3c;--blue:#2980b9;--orange:#e67e22;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);}
.topbar{background:#fff;border-bottom:1.5px solid var(--pink-border);padding:0 24px;height:58px;
  display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 2px 10px var(--shadow);}
.tbar-left{display:flex;align-items:center;gap:14px;}
.logo-icon{width:36px;height:36px;background:var(--pink);border-radius:9px;display:flex;align-items:center;justify-content:center;}
.brand{font-size:15px;font-weight:900;color:var(--pink);}
.page-label{font-size:16px;font-weight:800;color:var(--text);}
.tbar-right{display:flex;align-items:center;gap:8px;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:100px;
  font-size:12.5px;font-weight:800;border:none;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .15s;}
.btn-sm{padding:5px 12px;font-size:12px;}
.btn-primary{background:var(--pink);color:#fff;}
.btn-primary:hover{background:var(--pink-light);}
.btn-primary:disabled{opacity:.6;cursor:not-allowed;}
.btn-secondary{background:var(--pink-pale);color:var(--pink);border:1.5px solid var(--pink-border);}
.btn-secondary:hover{background:var(--pink-border);}
.btn-danger{background:#fdecea;color:var(--red);border:1.5px solid #f5c6c2;}
.btn-danger:hover{background:#f5c6c2;}
.btn-green{background:#e8f8ef;color:var(--green);border:1.5px solid #b8e8ce;}
.btn-green:hover{background:#b8e8ce;}
.content{padding:20px 24px 60px;}
.stats-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:20px;}
.stat-mini{background:#fff;border:1px solid var(--pink-border);border-radius:12px;padding:14px;display:flex;align-items:center;gap:11px;}
.stat-mini-icon{font-size:22px;}
.stat-mini-num{font-size:20px;font-weight:900;}
.stat-mini-label{font-size:11px;color:var(--muted);font-weight:600;}
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.search-input{flex:1;min-width:200px;max-width:320px;padding:9px 14px;border:1.5px solid var(--pink-border);
  border-radius:100px;font-size:13px;font-family:'Nunito',sans-serif;color:var(--text);background:#fff;outline:none;}
.search-input:focus{border-color:var(--pink);}
.fselect{padding:8px 13px;border:1.5px solid var(--pink-border);border-radius:9px;
  font-size:12.5px;font-family:'Nunito',sans-serif;font-weight:700;color:var(--text);background:#fff;outline:none;cursor:pointer;}
.fselect:focus{border-color:var(--pink);}
.results-count{font-size:12px;color:var(--muted);font-weight:600;margin-left:auto;}
.view-tabs{display:flex;gap:4px;padding:3px;background:var(--pink-pale);border-radius:9px;}
.vtab{width:32px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:6px;
  border:none;background:none;cursor:pointer;font-size:14px;transition:all .15s;}
.vtab.active{background:#fff;box-shadow:0 1px 4px var(--shadow);}
.table-wrap{overflow-x:auto;border-radius:14px;border:1px solid var(--pink-border);background:#fff;}
table{width:100%;border-collapse:collapse;}
th{background:var(--pink-pale);font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;
  padding:11px 14px;text-align:left;color:var(--muted);white-space:nowrap;}
td{padding:11px 14px;font-size:13px;border-bottom:1px solid var(--pink-border);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#fffbfc;}
.td-img{width:42px;height:42px;border-radius:8px;object-fit:cover;background:#eee;}
.td-img-wrap{position:relative;width:42px;display:inline-block;}
.td-img-badge{position:absolute;bottom:-4px;right:-4px;background:var(--pink);color:#fff;
  font-size:9px;font-weight:900;border-radius:100px;padding:1px 5px;border:1.5px solid #fff;}
.td-name{font-weight:800;font-size:13px;}
.td-desc{font-size:11px;color:var(--muted);max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.td-price{font-weight:900;color:var(--pink);font-size:13.5px;}
.td-old{font-size:11px;color:var(--muted);text-decoration:line-through;}
.stock-ok{color:var(--green);font-weight:800;}
.stock-low{color:var(--orange);font-weight:800;}
.stock-out{color:var(--red);font-weight:800;}
.td-actions{display:flex;gap:5px;}
.badge-pill{display:inline-block;padding:3px 10px;border-radius:100px;font-size:9.5px;font-weight:800;}
.bp-sale{background:#FFF3E0;color:var(--orange);}
.bp-new{background:#E8F5E9;color:var(--green);}
.bp-hot{background:#fdecea;color:var(--red);}
.bp-limited{background:#E3F2FD;color:var(--blue);}
.bp-none{background:var(--pink-pale);color:var(--muted);}
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px;}
.pcard{background:#fff;border-radius:14px;border:1px solid var(--pink-border);overflow:hidden;transition:transform .2s,box-shadow .2s;}
.pcard:hover{transform:translateY(-3px);box-shadow:0 8px 24px var(--shadow);}
.pcard-img{aspect-ratio:4/3;overflow:hidden;background:var(--pink-pale);position:relative;}
.pcard-img img{width:100%;height:100%;object-fit:cover;}
.pcard-badge-wrap{position:absolute;top:8px;left:8px;}
.pcard-img-count{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,.55);color:#fff;
  font-size:10px;font-weight:800;padding:3px 8px;border-radius:100px;}
.pcard-body{padding:12px;}
.pcard-cat{font-size:10px;font-weight:700;text-transform:uppercase;color:var(--muted);margin-bottom:2px;}
.pcard-name{font-size:13px;font-weight:800;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pcard-prices{display:flex;align-items:baseline;gap:6px;margin-bottom:8px;}
.pcard-price{font-size:14px;font-weight:900;color:var(--pink);}
.pcard-old{font-size:11px;color:var(--muted);text-decoration:line-through;}
.pcard-stock-bar{height:5px;border-radius:100px;background:var(--pink-pale);margin-bottom:7px;overflow:hidden;}
.pcard-stock-fill{height:100%;border-radius:100px;}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;
  align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;padding:14px;}
.modal-bg.open{opacity:1;pointer-events:all;}
.modal{background:#fff;border-radius:18px;width:100%;max-width:620px;max-height:92vh;
  overflow-y:auto;transform:translateY(14px);transition:transform .25s;}
.modal-bg.open .modal{transform:translateY(0);}
.mh{padding:18px 20px 14px;border-bottom:1px solid var(--pink-border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:2;}
.mh h2{font-size:16px;font-weight:800;}
.close-x{width:30px;height:30px;border-radius:50%;background:var(--pink-pale);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;color:var(--pink);font-size:15px;font-weight:900;}
.mb{padding:18px 20px;}
.fg{margin-bottom:13px;}
.fg label{display:block;font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:5px;}
.fg input,.fg select,.fg textarea{width:100%;padding:9px 12px;border:1.5px solid var(--pink-border);
  border-radius:9px;font-size:13.5px;font-family:'Nunito',sans-serif;color:var(--text);background:#FFF5F8;outline:none;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--pink);background:#fff;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.img-section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.img-section-label{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);}
.img-section-hint{font-size:11px;color:var(--muted);font-weight:600;}
.img-thumbs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px;margin-bottom:10px;}
.img-thumb-item{position:relative;border-radius:11px;overflow:hidden;border:2.5px solid var(--pink-border);
  aspect-ratio:1/1;background:var(--pink-pale);cursor:default;transition:border-color .15s;}
.img-thumb-item.primary{border-color:var(--pink);box-shadow:0 0 0 3px rgba(192,84,122,.18);}
.img-thumb-item img{width:100%;height:100%;object-fit:cover;display:block;}
.thumb-primary-badge{position:absolute;top:5px;left:5px;background:var(--pink);color:#fff;
  font-size:9px;font-weight:900;padding:2px 7px;border-radius:100px;pointer-events:none;}
.thumb-overlay{position:absolute;inset:0;background:rgba(0,0,0,.45);opacity:0;transition:opacity .15s;
  display:flex;align-items:center;justify-content:center;gap:6px;border-radius:9px;}
.img-thumb-item:hover .thumb-overlay{opacity:1;}
.thumb-btn{width:28px;height:28px;border-radius:50%;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:13px;transition:transform .1s;}
.thumb-btn:hover{transform:scale(1.15);}
.thumb-btn-star{background:#FFC107;color:#fff;}
.thumb-btn-del{background:var(--red);color:#fff;}
.img-add-tile{border:2.5px dashed var(--pink-border);border-radius:11px;aspect-ratio:1/1;
  background:var(--pink-pale);display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;transition:all .15s;gap:4px;}
.img-add-tile:hover,.img-add-tile.over{border-color:var(--pink);background:#fff;}
.img-add-tile span{font-size:22px;}
.img-add-tile small{font-size:10.5px;font-weight:700;color:var(--muted);}
.img-url-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
.img-url-row input{flex:1;padding:8px 12px;border:1.5px solid var(--pink-border);border-radius:9px;
  font-size:12.5px;font-family:'Nunito',sans-serif;color:var(--text);background:#FFF5F8;outline:none;}
.img-url-row input:focus{border-color:var(--pink);background:#fff;}
.img-url-btn{padding:8px 14px;border-radius:9px;background:var(--pink);color:#fff;border:none;
  font-size:12px;font-weight:800;cursor:pointer;white-space:nowrap;font-family:'Nunito',sans-serif;}
.img-url-btn:hover{background:var(--pink-light);}
.img-tabs{display:flex;gap:6px;margin-bottom:10px;}
.img-tab{padding:6px 14px;border-radius:100px;font-size:12px;font-weight:800;border:1.5px solid var(--pink-border);
  cursor:pointer;background:#fff;color:var(--muted);transition:all .15s;font-family:'Nunito',sans-serif;}
.img-tab.active{background:var(--pink);color:#fff;border-color:var(--pink);}
.save-status{border-radius:10px;padding:9px 13px;font-size:12.5px;font-weight:700;margin-bottom:12px;display:none;}
.save-status.show{display:block;}
.save-status.info{background:#E3F2FD;color:#1565C0;}
.save-status.ok{background:#e8f8ef;color:var(--green);}
.save-status.err{background:#fdecea;color:var(--red);}
.save-status.warn{background:#FFF3E0;color:var(--orange);}
.spinner{display:inline-block;width:13px;height:13px;border:2.5px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:4px;}
@keyframes spin{to{transform:rotate(360deg);}}
.bulk-bar{background:var(--pink);color:#fff;padding:10px 16px;border-radius:12px;display:none;align-items:center;justify-content:space-between;margin-bottom:12px;}
.bulk-bar.show{display:flex;}
.bulk-btn{padding:6px 14px;border-radius:100px;font-size:12px;font-weight:800;border:1.5px solid rgba(255,255,255,.4);background:rgba(255,255,255,.15);color:#fff;cursor:pointer;font-family:'Nunito',sans-serif;}
.bulk-btn:hover{background:rgba(255,255,255,.3);}
.confirm-modal{background:#fff;border-radius:16px;max-width:360px;padding:28px;text-align:center;}
.confirm-icon{font-size:42px;margin-bottom:12px;}
.confirm-title{font-size:17px;font-weight:800;margin-bottom:7px;}
.confirm-msg{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:18px;}
.confirm-btns{display:flex;gap:9px;justify-content:center;}
.empty-state{text-align:center;padding:60px;color:var(--muted);}
.toast{position:fixed;bottom:24px;right:24px;padding:10px 22px;border-radius:100px;font-size:13px;font-weight:700;z-index:600;opacity:0;pointer-events:none;transition:all .25s;white-space:nowrap;transform:translateY(8px);}
.toast.show{opacity:1;transform:translateY(0);}
.toast.ok{background:var(--green);color:#fff;}
.toast.err{background:var(--red);color:#fff;}
.toast.info{background:var(--text);color:#fff;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:var(--pink-border);border-radius:2px;}
@media(max-width:640px){.frow{grid-template-columns:1fr;}.view-tabs{display:none;}
  .img-thumbs-grid{grid-template-columns:repeat(3,1fr);}}
</style>
</head>
<body>

<div class="topbar">
  <div class="tbar-left">
    <div style="display:flex;align-items:center;gap:9px;">
      <div class="logo-icon"><svg width="18" height="16" viewBox="0 0 24 22" fill="none"><path d="M12 1L1 9v12h7v-7h8v7h7V9L12 1z" fill="white"/></svg></div>
      <div class="brand">Opulent</div>
    </div>
    <div style="width:1px;height:22px;background:var(--pink-border)"></div>
    <div class="page-label">🏷️ Manage Products</div>
  </div>
  <div class="tbar-right">
    <button class="btn btn-secondary" onclick="window.open('Sunup_admin.html','_blank')">⚙️ Admin ↗</button>
    <button class="btn btn-primary" onclick="openForm()">+ Add Product</button>
  </div>
</div>

<div class="content">
  <div class="stats-row" id="statsRow"></div>
  <div class="bulk-bar" id="bulkBar">
    <span style="font-size:13px;font-weight:800" id="bulkCount">0 selected</span>
    <div style="display:flex;gap:7px;">
      <button class="bulk-btn" onclick="bulkRestock()">📦 Restock All</button>
      <button class="bulk-btn" onclick="bulkDelete()">🗑 Delete Selected</button>
      <button class="bulk-btn" onclick="clearSelection()">✕ Clear</button>
    </div>
  </div>
  <div class="toolbar">
    <input class="search-input" id="searchInput" placeholder="🔍 Search products…" oninput="renderTable()"/>
    <select class="fselect" id="catFilter" onchange="renderTable()">
      <option value="all">All Categories</option>
      <option value="kitchen">Kitchen</option><option value="living">Living Room</option>
      <option value="appliances">Appliances</option><option value="gifts">Gifts</option>
      <option value="decor">Decor</option><option value="travel">Travel</option><option value="laundry">Laundry</option>
    </select>
    <select class="fselect" id="stockFilter" onchange="renderTable()">
      <option value="all">All Stock</option>
      <option value="ok">In Stock</option><option value="low">Low (≤5)</option><option value="out">Out of Stock</option>
    </select>
    <select class="fselect" id="sortSelect" onchange="renderTable()">
      <option value="default">Sort: Default</option>
      <option value="price-asc">Price: Low → High</option><option value="price-desc">Price: High → Low</option>
      <option value="stock-asc">Stock: Low → High</option><option value="name-asc">Name A–Z</option>
    </select>
    <span class="results-count" id="resultsCount"></span>
    <div class="view-tabs">
      <button class="vtab active" id="vtab-table" onclick="setView('table')">☰</button>
      <button class="vtab" id="vtab-grid" onclick="setView('grid')">⊞</button>
    </div>
  </div>
  <div id="tableView">
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th><input type="checkbox" id="selectAll" onchange="toggleSelectAll(this.checked)" style="accent-color:var(--pink)"/></th>
          <th>Image</th><th>Product Name</th><th>Category</th><th>Price</th><th>Old Price</th><th>Stock</th><th>Badge</th><th>Actions</th>
        </tr></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>
  <div id="gridView" style="display:none"><div class="product-grid" id="prodGrid"></div></div>
  <div class="empty-state" id="emptyState" style="display:none">
    <div style="font-size:48px;margin-bottom:12px">📦</div>
    <div style="font-size:16px;font-weight:800;margin-bottom:7px">No products found</div>
    <button class="btn btn-primary" onclick="openForm()">+ Add Your First Product</button>
  </div>
</div>

<!-- ADD/EDIT MODAL -->
<div class="modal-bg" id="productModal">
  <div class="modal">
    <div class="mh">
      <h2 id="formTitle">+ Add Product</h2>
      <button class="close-x" onclick="closeForm()">✕</button>
    </div>
    <div class="mb">
      <div class="save-status" id="saveStatus"></div>
      <div class="img-section-header">
        <div class="img-section-label">📸 Product Images</div>
        <div class="img-section-hint" id="imgCountHint">0 / 6 images · first = primary</div>
      </div>
      <div class="img-tabs">
        <button class="img-tab active" id="tabFile" onclick="switchImgTab('file')">📁 Upload Files</button>
        <button class="img-tab" id="tabUrl" onclick="switchImgTab('url')">🔗 Add by URL</button>
      </div>
      <div id="paneFile">
        <div class="img-thumbs-grid" id="thumbsGrid"></div>
        <input type="file" id="imgFileInput" accept="image/jpeg,image/png,image/webp" multiple style="display:none" onchange="handleFiles(this.files)"/>
        <div id="fileMsg" style="font-size:11.5px;font-weight:700;color:var(--muted);margin-top:2px;"></div>
      </div>
      <div id="paneUrl" style="display:none;">
        <div class="img-url-row">
          <input type="text" id="imgUrlInput" placeholder="https://example.com/product.jpg"/>
          <button class="img-url-btn" onclick="addImageFromUrl()">+ Add</button>
        </div>
        <div id="urlMsg" style="font-size:11.5px;font-weight:700;color:var(--muted);margin-bottom:6px;"></div>
      </div>
      <div style="height:14px"></div>
      <div class="fg"><label>Product Name *</label><input type="text" id="pName" placeholder="e.g. Bamboo Dish Rack" maxlength="200"/></div>
      <div class="fg"><label>Description</label><textarea id="pDesc" rows="2" placeholder="Short product description…" style="resize:vertical" maxlength="1000"></textarea></div>
      <div class="frow">
        <div class="fg"><label>Category *</label>
          <select id="pCat">
            <option value="kitchen">🥘 Kitchen</option><option value="living">🛋️ Living Room</option>
            <option value="appliances">🔌 Appliances</option><option value="gifts">🎁 Gifts</option>
            <option value="decor">🌿 Decor</option><option value="travel">🧳 Travel</option><option value="laundry">🫧 Laundry</option>
          </select>
        </div>
        <div class="fg"><label>Badge</label>
          <select id="pBadge">
            <option value="">None</option><option value="New">🟢 New</option>
            <option value="Sale">🟠 Sale</option><option value="Hot">🔴 Hot</option><option value="Limited">🔵 Limited</option>
          </select>
        </div>
      </div>
      <div class="frow">
        <div class="fg"><label>Price (Ksh) *</label><input type="number" id="pPrice" placeholder="1500" min="0" max="9999999"/></div>
        <div class="fg"><label>Old Price (strike-through)</label><input type="number" id="pOldPrice" placeholder="Leave blank if no discount" min="0" max="9999999"/></div>
      </div>
      <div class="frow">
        <div class="fg"><label>Stock Quantity *</label><input type="number" id="pStock" placeholder="50" min="0" max="99999"/></div>
        <div class="fg"><label>Rating (1–5)</label><input type="number" id="pRating" placeholder="4.5" min="1" max="5" step="0.1"/></div>
      </div>
      <input type="hidden" id="pId"/>
      <button class="btn btn-primary" id="saveBtn" style="width:100%;padding:13px;border-radius:100px;font-size:14px;margin-top:6px;" onclick="saveProduct()">
        Save Product
      </button>
    </div>
  </div>
</div>

<!-- CONFIRM DELETE MODAL -->
<div class="modal-bg" id="confirmModal">
  <div class="confirm-modal">
    <div class="confirm-icon">🗑️</div>
    <div class="confirm-title">Delete Product?</div>
    <div class="confirm-msg" id="confirmMsg">This cannot be undone.</div>
    <div class="confirm-btns">
      <button class="btn btn-secondary" onclick="document.getElementById('confirmModal').classList.remove('open')">Cancel</button>
      <button class="btn btn-danger" id="confirmYes">Delete</button>
    </div>
  </div>
</div>

<!-- RESTOCK MODAL -->
<div class="modal-bg" id="restockModal">
  <div class="confirm-modal">
    <div class="confirm-icon">📦</div>
    <div class="confirm-title" id="restockTitle">Restock Product</div>
    <div class="fg" style="text-align:left;margin-bottom:14px">
      <label style="font-size:11px;font-weight:800;text-transform:uppercase;color:var(--muted);letter-spacing:.07em;display:block;margin-bottom:5px;">Units to Add</label>

async function loadProductsFromDB(){
  try {
    // FIX: select only needed columns (not select('*'))
    const { data, error } = await _sb
      .from('products')
      .select('id, name, cat, price, old_price, stock, rating, reviews, badge, description, img, images')
      .order('id');
    if(error) throw error;
    if(data && data.length > 0){
      PRODUCTS = data.map(mapProd);
      syncShop();
      toast('✅ ' + PRODUCTS.length + ' products loaded', 'ok');
    } else {
      // Seed defaults — requires admin RLS policy to allow inserts
      const { data: seeded, error: seedErr } = await _sb.from('products').insert(DEFAULT_PRODUCTS).select('id, name, cat, price, old_price, stock, rating, reviews, badge, description, img, images');
      if(seedErr) throw seedErr;
      PRODUCTS = seeded.map(mapProd);
      syncShop();
      toast('✅ Seeded ' + PRODUCTS.length + ' default products', 'ok');
    }
  } catch(e){
    console.warn('DB load failed, using localStorage:', e.message);
    PRODUCTS = JSON.parse(localStorage.getItem('sc_products') || 'null') || [];
    if(!PRODUCTS.length){
      PRODUCTS = DEFAULT_PRODUCTS.map((p,i)=>({id:i+1,name:p.name,cat:p.cat,price:p.price,oldPrice:p.old_price,stock:p.stock,rating:p.rating,reviews:p.reviews||0,badge:p.badge,desc:p.description,img:p.img,images:[p.img]}));
    }
    toast('⚠️ Using cached data (' + e.message + ')', 'err', 5000);
  }
}

function mapProd(p){
  let images = [];
  try { images = p.images ? JSON.parse(p.images) : []; } catch(e){}
  if(!images.length && p.img) images = [p.img];
  return {
    id: p.id, name: p.name, cat: p.cat, price: p.price, oldPrice: p.old_price,
    stock: p.stock, rating: Number(p.rating)||4.5, reviews: p.reviews||0,
    badge: p.badge, desc: p.description, img: images[0] || p.img, images
  };
}

function getFiltered(){
  const q   = (document.getElementById('searchInput')?.value||'').toLowerCase();
  const cat = document.getElementById('catFilter')?.value||'all';
  const stk = document.getElementById('stockFilter')?.value||'all';
  const srt = document.getElementById('sortSelect')?.value||'default';
  let list  = PRODUCTS.filter(p=>{
    const mQ = !q||(p.name.toLowerCase().includes(q)||p.cat.toLowerCase().includes(q)||(p.desc||'').toLowerCase().includes(q));
    const mC = cat==='all'||p.cat===cat;
    const mS = stk==='all'||(stk==='ok'&&p.stock>5)||(stk==='low'&&p.stock>0&&p.stock<=5)||(stk==='out'&&p.stock===0);
    return mQ&&mC&&mS;
  });
  if(srt==='price-asc')  list.sort((a,b)=>a.price-b.price);
  else if(srt==='price-desc') list.sort((a,b)=>b.price-a.price);
  else if(srt==='stock-asc')  list.sort((a,b)=>a.stock-b.stock);
  else if(srt==='name-asc')   list.sort((a,b)=>a.name.localeCompare(b.name));
  return list;
}

function toggleSelect(id, checked){ checked ? selected.add(id) : selected.delete(id); updateBulkBar(); }

async function bulkDelete(){

  const ids = [...selected];
  PRODUCTS = PRODUCTS.filter(p=>!selected.has(p.id));
  syncShop(); selected.clear(); renderTable(); renderStats(); updateBulkBar();
  try { await _sb.from('products').delete().in('id', ids); } catch(e){ console.warn('Bulk delete DB failed:', e); }

}
async function bulkRestock(){
  const qty = parseInt(prompt('Units to add to each selected product:', '50'));
  if(!qty||isNaN(qty)||qty<1||qty>9999) return;
  const ids = [...selected];
  ids.forEach(id=>{ const p=PRODUCTS.find(x=>x.id===id); if(p) p.stock+=qty; });

// MULTI-IMAGE HELPERS
// ═══════════════════════════════════════════════
function updateImgCountHint(){
  document.getElementById('imgCountHint').textContent = `${imgList.length} / ${MAX_IMAGES} images · first = primary`;
}

function renderThumbs(){
  const grid = document.getElementById('thumbsGrid');
  let html = '';
  imgList.forEach((item, idx) => {
    const isPrimary = idx === 0;
    html += `
      <div class="img-thumb-item ${isPrimary?'primary':''}" id="thumb-${idx}"
        ondragover="thumbDragOver(event,${idx})" ondrop="thumbDrop(event,${idx})"
        draggable="true" ondragstart="thumbDragStart(event,${idx})">
        <img src="${esc(item.src)}" alt="Image ${idx+1}" draggable="false"/>
        ${isPrimary ? '<div class="thumb-primary-badge">⭐ Primary</div>' : ''}
        <div class="thumb-overlay">
          ${!isPrimary ? `<button class="thumb-btn thumb-btn-star" title="Set as primary" onclick="setPrimary(${idx})">⭐</button>` : ''}
          <button class="thumb-btn thumb-btn-del" title="Remove" onclick="removeImg(${idx})">🗑</button>
        </div>
      </div>`;
  });
  if(imgList.length < MAX_IMAGES){
    html += `
      <div class="img-add-tile"
        onclick="document.getElementById('imgFileInput').click()"
        ondragover="event.preventDefault();this.classList.add('over')"
        ondragleave="this.classList.remove('over')"
        ondrop="handleDropOnTile(event)">
        <span>＋</span><small>Add image</small>
        <small style="font-size:9.5px">(${MAX_IMAGES - imgList.length} left)</small>
      </div>`;
  }
  grid.innerHTML = html;
  updateImgCountHint();
}

let dragSrcIdx = null;
function thumbDragStart(e, idx){ dragSrcIdx = idx; e.dataTransfer.effectAllowed='move'; }
function thumbDragOver(e, idx){ e.preventDefault(); e.dataTransfer.dropEffect='move'; }
function thumbDrop(e, idx){
  e.preventDefault();
  if(dragSrcIdx === null || dragSrcIdx === idx) return;
  const moved = imgList.splice(dragSrcIdx, 1)[0];
  imgList.splice(idx, 0, moved);
  dragSrcIdx = null;
  renderThumbs();
}
function handleDropOnTile(e){
  e.preventDefault();
  document.querySelector('.img-add-tile')?.classList.remove('over');
  const files = e.dataTransfer.files;
  if(files.length) handleFiles(files);
}
function setPrimary(idx){
  if(idx === 0) return;
  const moved = imgList.splice(idx, 1)[0];
  imgList.unshift(moved);
  renderThumbs();
  toast('⭐ Primary image updated', 'info', 1500);
}
function removeImg(idx){ imgList.splice(idx, 1); renderThumbs(); }

function handleFiles(files){
  const fileArr = Array.from(files);
  const remaining = MAX_IMAGES - imgList.length;
  if(remaining <= 0){ toast(`⚠️ Maximum ${MAX_IMAGES} images allowed`, 'err'); return; }
  const toProcess = fileArr.slice(0, remaining);
  if(fileArr.length > remaining) toast(`⚠️ Only ${remaining} more allowed — added first ${remaining}`, 'err', 4000);
  let processed = 0;
  toProcess.forEach(file => {
    if(!file.type.startsWith('image/')){ toast('⚠️ Only image files allowed', 'err'); return; }
    if(file.size > 5*1024*1024){ toast(`⚠️ "${file.name}" exceeds 5MB`, 'err'); return; }
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        const MAX = 900; let w = img.width, h = img.height;
        if(w > MAX){ h = Math.round(h*MAX/w); w = MAX; }
        if(h > MAX){ w = Math.round(w*MAX/h); h = MAX; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        const b64 = canvas.toDataURL('image/jpeg', 0.82);
        canvas.toBlob(blob => {
          imgList.push({ src: b64, blob, finalUrl: null });
          processed++;
          renderThumbs();
          if(processed === toProcess.length){
            const msg = document.getElementById('fileMsg');
            msg.textContent = `✅ ${toProcess.length} image(s) ready`;
            msg.style.color = 'var(--green)';
          }
        }, 'image/jpeg', 0.82);
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
  document.getElementById('imgFileInput').value = '';
}

function addImageFromUrl(){
  const url = document.getElementById('imgUrlInput').value.trim();
  const msgEl = document.getElementById('urlMsg');
  if(!url){ msgEl.textContent = '⚠️ Enter a URL first'; msgEl.style.color='var(--red)'; return; }
  // Basic URL validation
  try { new URL(url); } catch(e){ msgEl.textContent = '⚠️ Invalid URL'; msgEl.style.color='var(--red)'; return; }
  if(imgList.length >= MAX_IMAGES){ toast(`⚠️ Maximum ${MAX_IMAGES} images allowed`, 'err'); return; }
  const testImg = new Image();
  testImg.onload = () => {
    imgList.push({ src: url, blob: null, finalUrl: url });
    renderThumbs();
    document.getElementById('imgUrlInput').value = '';
    msgEl.textContent = '✅ Image added!'; msgEl.style.color = 'var(--green)';
    setTimeout(() => msgEl.textContent = '', 2500);
  };
  testImg.onerror = () => {
    msgEl.textContent = '❌ Could not load image from that URL';
    msgEl.style.color = 'var(--red)';
  };
  testImg.src = url;
  msgEl.textContent = '⏳ Checking URL…'; msgEl.style.color = 'var(--muted)';
}

  const p = id ? PRODUCTS.find(x=>x.id===id) : null;
  document.getElementById('pName').value     = p?.name || '';
  document.getElementById('pDesc').value     = p?.desc || '';
  document.getElementById('pCat').value      = p?.cat || 'kitchen';
  document.getElementById('pBadge').value    = p?.badge || '';
  document.getElementById('pPrice').value    = p?.price || '';
  document.getElementById('pOldPrice').value = p?.oldPrice || '';
  document.getElementById('pStock').value    = p?.stock !== undefined ? p.stock : '';
  document.getElementById('pRating').value   = p?.rating || '4.5';
  if(p && (p.images||[]).length){
    imgList = p.images.map(url => ({ src: url, blob: null, finalUrl: url }));
  } else if(p?.img){
    imgList = [{ src: p.img, blob: null, finalUrl: p.img }];
  }
  switchImgTab('file');
  renderThumbs();
  document.getElementById('productModal').classList.add('open');
  setTimeout(()=>document.getElementById('pName').focus(), 100);
}

function closeForm(){ document.getElementById('productModal').classList.remove('open'); }

function switchImgTab(tab){
  document.getElementById('paneFile').style.display = tab==='file' ? '' : 'none';
  document.getElementById('paneUrl').style.display  = tab==='url'  ? '' : 'none';
  document.getElementById('tabFile').classList.toggle('active', tab==='file');
  document.getElementById('tabUrl').classList.toggle('active',  tab==='url');
}

// ═══════════════════════════════════════════════
// SAVE PRODUCT
// ═══════════════════════════════════════════════
async function saveProduct(){
  const btn      = document.getElementById('saveBtn');
  const name     = document.getElementById('pName').value.trim().slice(0, 200);
  const desc     = document.getElementById('pDesc').value.trim().slice(0, 1000);
  const cat      = document.getElementById('pCat').value;
  const badge    = document.getElementById('pBadge').value || null;
  const price    = parseFloat(document.getElementById('pPrice').value);
  const oldPrice = parseFloat(document.getElementById('pOldPrice').value) || null;
  const stock    = parseInt(document.getElementById('pStock').value) || 0;
  const rating   = Math.min(5, Math.max(1, parseFloat(document.getElementById('pRating').value) || 4.5));
  const editId   = document.getElementById('pId').value;

  if(!name)           { toast('⚠️ Name is required','err'); document.getElementById('pName').focus(); return; }
  if(!price||price<1) { toast('⚠️ Valid price is required','err'); document.getElementById('pPrice').focus(); return; }
  if(!imgList.length) { toast('⚠️ Add at least one product image','err'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Saving…';

  // Upload blobs to Supabase Storage
  const blobsToUpload = imgList.filter(item => item.blob !== null);
  if(blobsToUpload.length){
    setStatus(`⬆️ Uploading ${blobsToUpload.length} image(s)…`, 'info');
    for(let i = 0; i < imgList.length; i++){
      const item = imgList[i];
      if(!item.blob) continue;
      try {
        const filename = `products/product-${Date.now()}-${i}.jpeg`;
        const { error: upErr } = await _sb.storage
          .from('product-images')
          .upload(filename, item.blob, { contentType: 'image/jpeg', upsert: true });
        if(upErr) throw upErr;
        const { data: urlData } = _sb.storage.from('product-images').getPublicUrl(filename);
        imgList[i].finalUrl = urlData.publicUrl;
        imgList[i].blob = null;
      } catch(upEx){
        console.warn(`Upload failed for image ${i}:`, upEx);
        imgList[i].finalUrl = item.src;
      }
    }
  }

  const finalUrls  = imgList.map(item => item.finalUrl || item.src);
  const primaryImg = finalUrls[0];

  const payload = {
    name, cat,
    price:       Math.round(price),
    old_price:   oldPrice ? Math.round(oldPrice) : null,
    stock,
    rating,
    reviews:     0,
    badge:       badge || null,
    description: desc || '',
    img:         primaryImg,
    images:      JSON.stringify(finalUrls),
    updated_at:  new Date().toISOString()
  };

  try {
    let savedRow;
    if(editId){
      setStatus('💾 Updating product…', 'info');
      const { data, error } = await _sb
        .from('products').update(payload).eq('id', parseInt(editId))
        .select('id, name, cat, price, old_price, stock, rating, reviews, badge, description, img, images').single();
      if(error) throw error;
      savedRow = data;
      const idx = PRODUCTS.findIndex(p => p.id === parseInt(editId));
      if(idx > -1) PRODUCTS[idx] = mapProd(savedRow);
    } else {
      setStatus('💾 Saving new product…', 'info');
      const { data, error } = await _sb
        .from('products').insert(payload)
        .select('id, name, cat, price, old_price, stock, rating, reviews, badge, description, img, images').single();
      if(error) throw error;
      savedRow = data;
      PRODUCTS.push(mapProd(savedRow));
    }
    syncShop();
    setStatus(`✅ Saved with ${finalUrls.length} image(s)! (ID: ${savedRow.id})`, 'ok');
    toast(editId ? '✅ Product updated!' : `✅ Product added!`, 'ok');
    renderTable(); renderStats();
    setTimeout(closeForm, 1400);
  } catch(dbErr){
    console.error('DB save error:', dbErr);
    setStatus('❌ Database error: ' + dbErr.message, 'err');
    toast('❌ Save failed: ' + dbErr.message, 'err', 6000);
    // Local fallback
    const localId = editId ? parseInt(editId) : (Math.max(0, ...PRODUCTS.map(p=>p.id)) + 1);
    const local   = {id:localId,name,cat,price:Math.round(price),oldPrice:oldPrice?Math.round(oldPrice):null,stock,rating,reviews:0,badge,desc,img:primaryImg,images:finalUrls};
    if(editId){ const idx=PRODUCTS.findIndex(p=>p.id===parseInt(editId)); if(idx>-1) PRODUCTS[idx]=local; }
    else { PRODUCTS.push(local); }
    syncShop(); renderTable(); renderStats();
  }

  btn.disabled = false;
  btn.innerHTML = 'Save Product';
}

// ═══════════════════════════════════════════════
// DELETE
// ═══════════════════════════════════════════════
function confirmDelete(id){
  const p = PRODUCTS.find(x=>x.id===id);
  // FIX: Use textContent not innerHTML for confirm message
  document.getElementById('confirmMsg').textContent = `Delete "${p?.name}"? This cannot be undone.`;
  document.getElementById('confirmYes').onclick = () => deleteProduct(id);
  document.getElementById('confirmModal').classList.add('open');
}
async function deleteProduct(id){
  PRODUCTS = PRODUCTS.filter(x=>x.id!==id);
  syncShop(); renderTable(); renderStats();
  document.getElementById('confirmModal').classList.remove('open');
  toast('Product deleted', 'info');
  try { await _sb.from('products').delete().eq('id', id); } catch(e){ console.warn('DB delete failed:', e); }
}

// ═══════════════════════════════════════════════
// RESTOCK
// ═══════════════════════════════════════════════
function openRestock(id){
  restockId = id;
  const p = PRODUCTS.find(x=>x.id===id);
  // FIX: textContent not innerHTML
  document.getElementById('restockTitle').textContent = '📦 Restock: ' + (p?.name||'');
  document.getElementById('restockQty').value = 50;
  document.getElementById('restockModal').classList.add('open');
}
async function doRestock(){
  const qty = parseInt(document.getElementById('restockQty').value);
  if(!qty||isNaN(qty)||qty<1||qty>9999){ toast('⚠️ Enter valid quantity (1–9999)','err'); return; }
  const p = PRODUCTS.find(x=>x.id===restockId);
  if(p){
    p.stock += qty;
    syncShop(); renderTable(); renderStats();
    toast('✅ +'+qty+' units added to "'+p.name+'"','ok');
    try { await _sb.from('products').update({stock:p.stock,updated_at:new Date().toISOString()}).eq('id',restockId); } catch(e){}
  }
  document.getElementById('restockModal').classList.remove('open');
}

// ═══════════════════════════════════════════════
// INIT — server-verified admin auth guard
// ═══════════════════════════════════════════════
function showBanner(msg, type='err'){
  let b = document.getElementById('connBanner');
  if(!b){
    b = document.createElement('div'); b.id='connBanner';
    b.style.cssText='position:fixed;top:58px;left:0;right:0;z-index:200;padding:11px 20px;font-size:13px;font-weight:800;text-align:center;';
    document.body.appendChild(b);
  }
  b.style.background = type==='ok'?'#e8f8ef':type==='warn'?'#FFF3E0':'#fdecea';
  b.style.color = type==='ok'?'#27ae60':type==='warn'?'#e67e22':'#c62828';
  b.style.borderBottom = '2px solid '+(type==='ok'?'#b8e8ce':type==='warn'?'#FFD88A':'#f5c6c2');
  b.textContent = msg; // FIX: textContent not innerHTML
}
function hideBanner(){ const b=document.getElementById('connBanner'); if(b) b.remove(); }

async function productsInit(){
  // FIX: Verify session server-side via Supabase auth, not just sessionStorage
  const sessionLocal = sessionStorage.getItem('oc_admin');
  if(!sessionLocal){ window.location.href='opulent admin login.html'; return; }

  // Server-side check — confirm user is actually authenticated
  const { data: { user }, error: authErr } = await _sb.auth.getUser();
  if(authErr || !user){
    sessionStorage.removeItem('oc_admin');
    window.location.href='opulent admin login.html';
    return;
  }

  showBanner('🔄 Connecting to Supabase…', 'warn');
  try {
    const res = await Promise.race([
      fetch(SUPABASE_URL + '/rest/v1/', { headers:{'apikey': ANON_KEY} }),
      new Promise((_, rej) => setTimeout(() => rej(new Error('timed out after 8s')), 8000))
    ]);
    if(res.status === 0 || res.status >= 500) throw new Error('HTTP ' + res.status);
    hideBanner();
  } catch(pingErr){
    showBanner('❌ Supabase unreachable. Go to supabase.com → open project → Resume if paused. Using cached data.', 'err');
    PRODUCTS = JSON.parse(localStorage.getItem('sc_products') || 'null') || [];
    renderStats(); renderTable();
    return;
  }

  await loadProductsFromDB();
  renderStats();
  renderTable();
}

productsInit();
</script>
