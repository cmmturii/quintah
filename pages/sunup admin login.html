<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Opulent Admin — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
:root{
  --pink:#C0547A;--pink-light:#E06E8A;--pink-pale:#FDF0F4;--pink-border:#F2D0DB;
  --bg:#FFF8FB;--text:#2E1A22;--muted:#9B6B7A;--shadow:rgba(192,84,122,0.15);
  --green:#27ae60;--red:#e74c3c;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);}
body{
  background-image:
    radial-gradient(ellipse at 10% 10%,rgba(255,182,210,0.35) 0%,transparent 55%),
    radial-gradient(ellipse at 90% 90%,rgba(255,200,220,0.28) 0%,transparent 50%);
  display:flex;align-items:center;justify-content:center;padding:20px;min-height:100vh;
}

.card{
  background:#fff;border-radius:24px;width:100%;max-width:420px;
  box-shadow:0 24px 80px var(--shadow);overflow:hidden;
  animation:rise .5s cubic-bezier(.4,0,.2,1) both;
}
@keyframes rise{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.card-top{
  background:linear-gradient(135deg,var(--pink) 0%,#E06E8A 100%);
  padding:36px 32px 28px;text-align:center;position:relative;overflow:hidden;
}
.card-top::before{
  content:'';position:absolute;top:-40px;right:-40px;width:130px;height:130px;
  border-radius:50%;background:rgba(255,255,255,.1);
}
.card-top::after{
  content:'';position:absolute;bottom:-30px;left:-30px;width:100px;height:100px;
  border-radius:50%;background:rgba(255,255,255,.08);
}
.logo-ring{
  width:68px;height:68px;border-radius:20px;background:rgba(255,255,255,.22);
  display:flex;align-items:center;justify-content:center;margin:0 auto 16px;
  backdrop-filter:blur(4px);border:1.5px solid rgba(255,255,255,.3);
  position:relative;z-index:1;
}
.card-title{font-size:22px;font-weight:900;color:#fff;margin-bottom:4px;position:relative;z-index:1;}
.card-sub{font-size:13px;color:rgba(255,255,255,.8);font-weight:600;position:relative;z-index:1;}
.admin-badge{
  display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.2);
  border:1px solid rgba(255,255,255,.3);border-radius:100px;padding:4px 12px;
  font-size:11px;font-weight:800;color:#fff;letter-spacing:.06em;text-transform:uppercase;
  margin-top:10px;position:relative;z-index:1;
}

.card-body{padding:28px 32px 32px;}

.err-box{
  background:#FFEBEE;border:1px solid #FFCDD2;border-radius:11px;padding:11px 14px;
  font-size:13px;font-weight:700;color:var(--red);margin-bottom:16px;
  display:none;align-items:center;gap:8px;
}
.err-box.show{display:flex;}

.fg{margin-bottom:16px;}
.fg label{
  display:block;font-size:10.5px;font-weight:800;text-transform:uppercase;
  letter-spacing:.08em;color:var(--muted);margin-bottom:6px;
}
.fg input{
  width:100%;padding:11px 14px;border:1.5px solid var(--pink-border);border-radius:12px;
  font-size:14px;font-family:'Nunito',sans-serif;color:var(--text);background:#FFF5F8;
  outline:none;transition:all .15s;
}
.fg input:focus{border-color:var(--pink);background:#fff;box-shadow:0 0 0 3px rgba(192,84,122,.08);}

.pw-wrap{position:relative;}
.pw-toggle{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;font-size:16px;color:var(--muted);
  padding:4px;line-height:1;
}

.sign-btn{
  width:100%;padding:13px;background:linear-gradient(135deg,var(--pink),var(--pink-light));
  color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:800;
  font-family:'Nunito',sans-serif;cursor:pointer;margin-top:4px;
  transition:all .2s;box-shadow:0 4px 16px rgba(192,84,122,.3);
}
.sign-btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(192,84,122,.4);}
.sign-btn:active{transform:translateY(0);}
.sign-btn:disabled{opacity:.65;cursor:not-allowed;transform:none;}

.divider{
  display:flex;align-items:center;gap:10px;margin:20px 0;
  color:var(--muted);font-size:12px;font-weight:600;
}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--pink-border);}

.google-btn{
  width:100%;padding:11px;background:#fff;border:1.5px solid var(--pink-border);
  border-radius:12px;font-size:13.5px;font-weight:700;font-family:'Nunito',sans-serif;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;
  transition:all .15s;color:var(--text);
}
.google-btn:hover{background:var(--pink-pale);border-color:var(--pink-light);}
.google-btn:disabled{opacity:.6;cursor:not-allowed;}

.back-link{
  display:flex;align-items:center;justify-content:center;gap:6px;
  margin-top:20px;font-size:12.5px;color:var(--muted);font-weight:700;
  text-decoration:none;transition:color .15s;
}
.back-link:hover{color:var(--pink);}

.loading-dots{display:inline-flex;gap:4px;align-items:center;}
.loading-dots span{width:6px;height:6px;border-radius:50%;background:#fff;animation:ld .7s infinite ease-in-out;}
.loading-dots span:nth-child(2){animation-delay:.14s;}
.loading-dots span:nth-child(3){animation-delay:.28s;}
@keyframes ld{0%,80%,100%{transform:scale(.4);opacity:.4}40%{transform:scale(1);opacity:1}}

/* Security notice */
.sec-note{
  background:var(--pink-pale);border-radius:10px;padding:10px 13px;
  font-size:11.5px;color:var(--muted);font-weight:600;margin-top:16px;
  display:flex;align-items:flex-start;gap:8px;line-height:1.5;
}
</style>
</head>
<body>

<div class="card">
  <div class="card-top">
    <div class="logo-ring">
      <svg width="30" height="26" viewBox="0 0 24 22" fill="none"><path d="M12 1L1 9v12h7v-7h8v7h7V9L12 1z" fill="white"/></svg>
    </div>
    <div class="card-title">Opulent Collections</div>
    <div class="card-sub">Admin Portal</div>
    <div class="admin-badge">🔐 Restricted Access</div>
  </div>

  <div class="card-body">
    <div class="err-box" id="errBox">
      <span>⚠</span><span id="errMsg">Invalid credentials</span>
    </div>

    <div class="fg">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="admin@example.com" autocomplete="username" onkeydown="if(event.key==='Enter')document.getElementById('pw').focus()"/>
    </div>
    <div class="fg">
      <label>Password</label>
      <div class="pw-wrap">
        <input type="password" id="pw" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"/>
        <button class="pw-toggle" onclick="togglePw()" id="pwToggle" type="button">👁</button>
      </div>
    </div>

    <button class="sign-btn" id="loginBtn" onclick="doLogin()">Sign In to Admin</button>

    <div class="divider">or</div>

    <button class="google-btn" id="googleBtn" onclick="googleLogin()">
      <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Continue with Google
    </button>

    <div class="sec-note">
      🔒 This portal is for authorised staff only. Admins must have the <strong>admin</strong> role assigned in the database. Unauthorised access attempts are logged.
    </div>

    <a class="back-link" href="opulent-shop.html">← Back to Shop</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL      = 'https://azwcxezzzljbjgojwtax.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF6d2N4ZXp6emxqYmpnb2p3dGF4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxMTk2NTQsImV4cCI6MjA4NzY5NTY1NH0.wFrC32vU0MWbp-otIif5WdlCemeIDXEa2DyLXrl1OEI';

const _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth:{ autoRefreshToken:true, persistSession:true, detectSessionInUrl:true }
});

// If already logged in and admin, go straight to admin panel
(async()=>{
  const { data:{ session } } = await _sb.auth.getSession();
  if(session?.user){
    const { data:profile } = await _sb.from('profiles').select('role').eq('id',session.user.id).single();
    if(profile?.role === 'admin'){
      window.location.href = 'opulent-admin.html';
    }
  }
})();

function showErr(msg){ const b=document.getElementById('errBox'); document.getElementById('errMsg').textContent=msg; b.classList.add('show'); }
function hideErr(){ document.getElementById('errBox').classList.remove('show'); }
function setLoading(on){
  const btn=document.getElementById('loginBtn'), gb=document.getElementById('googleBtn');
  btn.disabled=on; gb.disabled=on;
  btn.innerHTML=on?'<div class="loading-dots"><span></span><span></span><span></span></div>':'Sign In to Admin';
}
function togglePw(){
  const inp=document.getElementById('pw'), tog=document.getElementById('pwToggle');
  inp.type=inp.type==='password'?'text':'password';
  tog.textContent=inp.type==='password'?'👁':'🙈';
}

async function doLogin(){
  const email=document.getElementById('email').value.trim();
  const pw=document.getElementById('pw').value;
  if(!email||!pw){ showErr('Please enter your email and password.'); return; }
  hideErr(); setLoading(true);
  try {
    const { data, error } = await _sb.auth.signInWithPassword({ email, password:pw });
    if(error) throw error;
    await checkAndRedirect(data.user);
  } catch(e){
    const msg = e.message.includes('Invalid login') ? 'Incorrect email or password.' : e.message;
    showErr(msg); setLoading(false);
  }
}

async function googleLogin(){
  hideErr();
  document.getElementById('googleBtn').disabled=true;
  try {
    const { error } = await _sb.auth.signInWithOAuth({
      provider:'google',
      options:{ redirectTo: window.location.href }
    });
    if(error) throw error;
  } catch(e){
    showErr('Google sign-in failed: ' + e.message);
    document.getElementById('googleBtn').disabled=false;
  }
}

async function checkAndRedirect(user){
  if(!user){ showErr('No user found.'); setLoading(false); return; }
  const { data:profile, error } = await _sb.from('profiles').select('role,first_name').eq('id',user.id).single();
  if(error || !profile){ showErr('Profile not found. Contact your administrator.'); setLoading(false); return; }
  if(profile.role !== 'admin'){
    await _sb.auth.signOut();
    showErr('Access denied. Your account does not have admin privileges.');
    setLoading(false); return;
  }
  // Store admin session info and redirect
  sessionStorage.setItem('oc_admin_user', JSON.stringify({ id:user.id, email:user.email, name:profile.first_name }));
  window.location.href = 'opulent-admin.html';
}

// Handle OAuth redirect
_sb.auth.onAuthStateChange(async(event, session)=>{
  if(event === 'SIGNED_IN' && session?.user){
    await checkAndRedirect(session.user);
  }
});
</script>
</body>
</html>
